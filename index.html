<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Relatório Diário ABNT</title>
    <style>
        :root {
            --bg: #eef2f7;
            --card: #ffffff;
            --border: #d7dde8;
            --text: #1f3143;
            --muted: #6f7e8f;
            --primary: #3c79f5;
            --primary-dark: #325dc4;
            --accent: #f5b700;
            --shadow: 0 24px 60px rgba(31, 49, 67, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top left, #eef5ff 0%, #f8fafc 45%, var(--bg) 100%);
            color: var(--text);
        }

        .container {
            max-width: 920px;
            margin: 40px auto;
            background: var(--card);
            padding: 32px;
            border-radius: 28px;
            border: 1px solid rgba(135, 156, 183, 0.18);
            box-shadow: var(--shadow);
        }

        header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 18px;
            align-items: center;
            margin-bottom: 28px;
        }

        header h1 {
            margin: 0;
            font-size: clamp(1.9rem, 2.5vw, 2.8rem);
            line-height: 1.05;
            letter-spacing: -0.04em;
        }

        header p {
            margin: 0;
            color: var(--muted);
            max-width: 540px;
            font-size: 0.98rem;
        }

        .section {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: 0.01em;
        }

        input,
        textarea {
            width: 100%;
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: #f8fafc;
            color: var(--text);
            font-size: 0.98rem;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            resize: vertical;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(60, 121, 245, 0.12);
            background: #ffffff;
        }

        textarea {
            min-height: 120px;
        }

        .button-row {
            display: grid;
            grid-template-columns: repeat(2, minmax(160px, 1fr));
            gap: 14px;
            margin-top: 6px;
        }

        button {
            padding: 14px 18px;
            border: none;
            border-radius: 14px;
            font-size: 0.98rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
            box-shadow: 0 12px 24px rgba(28, 40, 63, 0.08);
        }

        #gerarPdfBtn,
        #gerarDocBtn,
        #gerarAmbosBtn {
            background: linear-gradient(135deg, #3c79f5 0%, #57a0ff 100%);
            color: white;
        }

        #reauthBtn {
            background: linear-gradient(135deg, #f5b700 0%, #fa9b2b 100%);
            color: #1f3143;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 32px rgba(28, 40, 63, 0.16);
        }

        button:active {
            transform: translateY(0);
        }

        .small-note {
            color: var(--muted);
            font-size: 0.92rem;
            margin-top: 4px;
        }

        @media (max-width: 740px) {
            .container {
                margin: 20px;
                padding: 24px;
            }

            .button-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gerador de Relatório Diário ABNT</h1>
        <p style="margin-top: 8px; color: #5e6f85; line-height: 1.7; max-width: 760px;">Preencha o relatório e gere automaticamente os arquivos formatados em ABNT. Depois, envie direto para o seu Google Drive com um clique.</p>
        <form id="relatorioForm">
            <div class="section">
                <label for="titulo">Título do Relatório:</label>
                <input type="text" id="titulo" required>
            </div>
            <div class="section">
                <label for="autor">Autor:</label>
                <input type="text" id="autor" required>
            </div>
            <div class="section">
                <label for="data">Data:</label>
                <input type="date" id="data" required>
            </div>
            <div class="section">
                <label for="instituicao">Instituição:</label>
                <input type="text" id="instituicao">
            </div>
            <div class="section">
                <label for="logo">Logo da Instituição:</label>
                <input type="file" id="logo" accept="image/*">
            </div>
            <div class="section">
                <label for="introducao">Introdução:</label>
                <textarea id="introducao"></textarea>
            </div>
            <div class="section">
                <label for="objetivos">Objetivos:</label>
                <textarea id="objetivos"></textarea>
            </div>
            <div class="section">
                <label for="materiais">Materiais Utilizados:</label>
                <textarea id="materiais"></textarea>
            </div>
            <div class="section">
                <label for="experimental">Parte Experimental:</label>
                <textarea id="experimental"></textarea>
            </div>
            <div class="section">
                <label for="resultados">Resultados e Discussão:</label>
                <textarea id="resultados"></textarea>
            </div>
            <div class="section">
                <label for="observacoes">Observações:</label>
                <textarea id="observacoes"></textarea>
            </div>
            <div class="section">
                <label for="bibliografia">Bibliografia:</label>
                <textarea id="bibliografia"></textarea>
            </div>
            <div class="section button-row">
                <button type="button" id="gerarPdfBtn">Gerar e Enviar PDF</button>
                <button type="button" id="gerarDocBtn">Gerar e Enviar DOC</button>
                <button type="button" id="gerarAmbosBtn">Gerar Ambos (PDF + DOC)</button>
                <button type="button" id="reauthBtn">Reautenticar</button>
            </div>
        </form>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/docx@7.8.2/build/index.js"></script>
    <script async defer src="https://accounts.google.com/gsi/client"></script>
    <script async defer src="https://apis.google.com/js/api.js"></script>
    <script>
        // Configurações do Google Drive API (Google Identity Services - GSI)
        // Para configurar:
        // 1. Vá para https://console.cloud.google.com/
        // 2. Crie um projeto ou selecione um existente
        // 3. Habilite a Google Drive API
        // 4. Crie credenciais OAuth 2.0 (Client ID)
        // 5. Adicione o domínio do seu site nas configurações do OAuth
        // 6. Substitua SEU_CLIENT_ID_AQUI pelo Client ID
        // 7. Para a pasta, crie uma pasta no Drive, copie o ID da URL e substitua SUA_PASTA_ID_AQUI
        const CLIENT_ID = '115610315865-tfqdh7l8pq6fth5ns3rc7e41jba2osah.apps.googleusercontent.com';
        const PASTA_ID = '15NsKeQxuEg8w2ZCQsF0Atiu62Wsh53AJ';
        const SCOPES = 'https://www.googleapis.com/auth/drive.file';

        let tokenClient;
        let accessToken = null;

        // Inicializar Google Identity Services
        function initializeGSI() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: handleTokenResponse
            });
        }

        function handleTokenResponse(response) {
            if (response.access_token) {
                accessToken = response.access_token;
                console.log('✓ Acesso autenticado');
            }
        }

        // Solicitar token de acesso
        function requestAccessToken() {
            console.log('Solicitando token de acesso...');
            if (accessToken === null) {
                console.log('Token não existe, solicitando consentimento...');
                tokenClient.requestAccessToken({prompt: 'consent'});
            } else {
                console.log('Token existe, renovando...');
                tokenClient.requestAccessToken({prompt: ''});
            }
        }

        // Verificar se está autenticado
        function isAuthenticated() {
            return accessToken !== null;
        }

        // Forçar nova autenticação
        function forceReauth() {
            accessToken = null;
            console.log('Forçando reautenticação...');
            requestAccessToken();
        }

        // Esperar que GSI esteja carregado
        window.addEventListener('load', () => {
            if (typeof google !== 'undefined') {
                initializeGSI();
            }
            
            // Verificar se bibliotecas carregaram
            setTimeout(() => {
                console.log('Verificando bibliotecas...');
                console.log('jsPDF carregado:', !!window.jspdf);
                console.log('DOCX carregado:', !!window.docx);
                
                if (!window.docx) {
                    console.warn('Biblioteca DOCX não carregou. Tente recarregar a página.');
                    alert('Biblioteca DOCX não carregou. Tente recarregar a página (F5).');
                }
                if (!window.jspdf) {
                    console.warn('Biblioteca jsPDF não carregou. Tente recarregar a página.');
                    alert('Biblioteca jsPDF não carregou. Tente recarregar a página (F5).');
                }
            }, 3000);
        });


        // Gerar PDF com formatação ABNT
        async function gerarPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ unit: 'mm', format: 'a4' });

            // Configurações ABNT: Margens 3cm superior/esquerda, 2cm inferior/direita
            const marginLeft = 30; // 3cm em mm
            const marginRight = 20; // 2cm em mm
            const marginTop = 30;
            const marginBottom = 20; // 2cm em mm
            const pageWidth = doc.internal.pageSize.getWidth();
            const pageHeight = doc.internal.pageSize.getHeight();
            const contentWidth = pageWidth - marginLeft - marginRight;
            const firstLineIndent = 12.5; // 1,25cm em mm

            const titulo = document.getElementById('titulo').value.trim() || 'RELATÓRIO DIÁRIO';
            const autor = document.getElementById('autor').value.trim() || 'Não informado';
            const data = document.getElementById('data').value.trim() || 'Não informado';
            const instituicao = document.getElementById('instituicao').value.trim() || 'Instituição não informada';
            const introducao = document.getElementById('introducao').value;
            const objetivos = document.getElementById('objetivos').value;
            const materiais = document.getElementById('materiais').value;
            const experimental = document.getElementById('experimental').value;
            const resultados = document.getElementById('resultados').value;
            const observacoes = document.getElementById('observacoes').value;
            const bibliografia = document.getElementById('bibliografia').value;

            function addJustifiedParagraph(text, startY) {
                const words = text.trim().split(/\s+/);
                let currentLine = '';
                let y = startY;
                let isFirstLine = true;
                const lines = [];

                for (let word of words) {
                    const testLine = currentLine + (currentLine ? ' ' : '') + word;
                    const testWidth = doc.getTextWidth(testLine);
                    if (testWidth > contentWidth - (isFirstLine ? firstLineIndent : 0) && currentLine) {
                        lines.push({ text: currentLine, isFirst: isFirstLine });
                        currentLine = word;
                        isFirstLine = false;
                    } else {
                        currentLine = testLine;
                    }
                }
                if (currentLine) {
                    lines.push({ text: currentLine, isFirst: isFirstLine });
                }

                for (let line of lines) {
                    const xPos = marginLeft + (line.isFirst ? firstLineIndent : 0);
                    doc.text(line.text, xPos, y, { align: 'justify' });
                    y += 8.5;
                }
                return y + 5;
            }

            // Página de capa
            doc.setFont('Times', 'bold');
            doc.setFontSize(12);
            doc.text('RELATÓRIO DIÁRIO', pageWidth / 2, marginTop + 20, { align: 'center' });
            doc.setFontSize(14);
            doc.text(instituicao.toUpperCase(), pageWidth / 2, marginTop + 35, { align: 'center' });
            doc.setFontSize(28);
            doc.setFont('Times', 'bold');
            doc.text(titulo.toUpperCase(), pageWidth / 2, pageHeight / 2 - 20, { align: 'center' });
            doc.setFontSize(12);
            doc.setFont('Times', 'normal');
            doc.text(`Autor: ${autor}`, pageWidth / 2, pageHeight / 2 + 20, { align: 'center' });
            doc.text(`Data: ${data}`, pageWidth / 2, pageHeight / 2 + 34, { align: 'center' });
            doc.text(`Instituição: ${instituicao}`, pageWidth / 2, pageHeight / 2 + 48, { align: 'center' });

            if (document.getElementById('logo').files[0]) {
                const logoFile = document.getElementById('logo').files[0];
                const logoDataUrl = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve(e.target.result);
                    reader.readAsDataURL(logoFile);
                });
                doc.addImage(logoDataUrl, 'PNG', pageWidth - marginRight - 45, marginTop, 40, 40);
            }

            const secoes = [
                { num: '1', titulo: 'Introdução', conteudo: introducao },
                { num: '2', titulo: 'Objetivos', conteudo: objetivos },
                { num: '3', titulo: 'Materiais Utilizados', conteudo: materiais },
                { num: '4', titulo: 'Parte Experimental', conteudo: experimental },
                { num: '5', titulo: 'Resultados e Discussão', conteudo: resultados },
                { num: '6', titulo: 'Observações', conteudo: observacoes },
                { num: '7', titulo: 'Bibliografia', conteudo: bibliografia }
            ];

            for (let i = 0; i < secoes.length; i++) {
                if (!secoes[i].conteudo.trim()) continue;
                doc.addPage();
                let y = marginTop;
                doc.setFontSize(12);
                doc.setFont('Times', 'bold');
                doc.text(`${secoes[i].num} ${secoes[i].titulo}`, marginLeft, y);
                y += 16;
                doc.setFont('Times', 'normal');
                y = addJustifiedParagraph(secoes[i].conteudo, y);
            }

            return doc.output('blob');
        }

        // Gerar documento DOCX com formatação ABNT
        async function gerarDOCX() {
            const docx = window.docx;

            const titulo = document.getElementById('titulo').value;
            const autor = document.getElementById('autor').value;
            const data = document.getElementById('data').value;
            const instituicao = document.getElementById('instituicao').value;
            const introducao = document.getElementById('introducao').value;
            const objetivos = document.getElementById('objetivos').value;
            const materiais = document.getElementById('materiais').value;
            const experimental = document.getElementById('experimental').value;
            const resultados = document.getElementById('resultados').value;
            const observacoes = document.getElementById('observacoes').value;
            const bibliografia = document.getElementById('bibliografia').value;

            let children = [];

            // Capa
            children.push(
                new docx.Paragraph({
                    text: titulo,
                    alignment: docx.AlignmentType.CENTER,
                    spacing: { line: 360, lineRule: 'auto', after: 240 },
                    runs: [new docx.TextRun({ size: 24, bold: true, font: 'Times New Roman' })]
                }),
                new docx.Paragraph({
                    text: `Autor: ${autor}`,
                    alignment: docx.AlignmentType.CENTER,
                    spacing: { line: 360, lineRule: 'auto', after: 120 },
                    runs: [new docx.TextRun({ size: 24, font: 'Times New Roman' })]
                }),
                new docx.Paragraph({
                    text: `Data: ${data}`,
                    alignment: docx.AlignmentType.CENTER,
                    spacing: { line: 360, lineRule: 'auto', after: 120 },
                    runs: [new docx.TextRun({ size: 24, font: 'Times New Roman' })]
                })
            );

            if (instituicao) {
                children.push(
                    new docx.Paragraph({
                        text: `Instituição: ${instituicao}`,
                        alignment: docx.AlignmentType.CENTER,
                        spacing: { line: 360, lineRule: 'auto', after: 120 },
                        runs: [new docx.TextRun({ size: 24, font: 'Times New Roman' })]
                    })
                );
            }

            // Quebra de página após a capa
            children.push(new docx.PageBreak());

            // Seções com numeração hierárquica
            const secoes = [
                { num: '1', titulo: 'Introdução', conteudo: introducao },
                { num: '2', titulo: 'Objetivos', conteudo: objetivos },
                { num: '3', titulo: 'Materiais Utilizados', conteudo: materiais },
                { num: '4', titulo: 'Parte Experimental', conteudo: experimental },
                { num: '5', titulo: 'Resultados e Discussão', conteudo: resultados },
                { num: '6', titulo: 'Observações', conteudo: observacoes },
                { num: '7', titulo: 'Bibliografia', conteudo: bibliografia }
            ];

            for (let i = 0; i < secoes.length; i++) {
                const secao = secoes[i];
                
                // Quebra de página antes de cada título principal (exceto o primeiro)
                if (i > 0) {
                    children.push(new docx.PageBreak());
                }

                // Título numerado em negrito, tamanho 12, esquerda
                children.push(
                    new docx.Paragraph({
                        text: `${secao.num} ${secao.titulo}`,
                        alignment: docx.AlignmentType.LEFT,
                        spacing: { line: 360, lineRule: 'auto', before: 0, after: 120 },
                        runs: [new docx.TextRun({ size: 24, bold: true, font: 'Times New Roman' })]
                    })
                );

                // Conteúdo com recuo de 1,25cm, justificado, espaçamento 1.5
                children.push(
                    new docx.Paragraph({
                        text: secao.conteudo || ' ',
                        alignment: docx.AlignmentType.JUSTIFIED,
                        spacing: { line: 360, lineRule: 'auto', after: 240 },
                        indentation: {
                            firstLine: docx.convertInchesToTwip(0.5), // 1,25cm recuo primeira linha
                            left: 0,
                            right: 0
                        },
                        runs: [new docx.TextRun({ size: 24, font: 'Times New Roman' })]
                    })
                );
                if (i < secoes.length - 1) {
                    children.push(new docx.PageBreak());
                }
            }

            const doc = new docx.Document({
                margins: {
                    top: docx.convertInchesToTwip(1.18), // 3cm
                    bottom: docx.convertInchesToTwip(0.79), // 2cm
                    left: docx.convertInchesToTwip(1.18), // 3cm
                    right: docx.convertInchesToTwip(0.79) // 2cm
                },
                sections: [{
                    children: children
                }]
            });

            return new Promise((resolve) => {
                docx.Packer.toBlob(doc).then((blob) => {
                    resolve(blob);
                });
            });
        }

        // Enviar para Google Drive
        async function enviarParaDrive(arquivoBlob, nomeArquivo) {
            console.log('Verificando autenticação...');
            
            if (!isAuthenticated()) {
                console.log('Não autenticado, solicitando acesso...');
                requestAccessToken();
                
                // Aguardar até 5 segundos pelo token
                let attempts = 0;
                const waitForToken = setInterval(() => {
                    attempts++;
                    console.log(`Tentativa ${attempts}/50 de obter token...`);
                    if (isAuthenticated()) {
                        clearInterval(waitForToken);
                        console.log('Token obtido, continuando upload...');
                        enviarParaDrive(arquivoBlob, nomeArquivo);
                    } else if (attempts > 50) {
                        clearInterval(waitForToken);
                        alert('Timeout na autenticação. Clique em "Reautenticar" e tente novamente.');
                    }
                }, 100);
                return;
            }

            console.log('Autenticado, fazendo upload...');
            try {
                const fileMetadata = {
                    name: nomeArquivo,
                    parents: [PASTA_ID]
                };

                const form = new FormData();
                form.append('metadata', new Blob([JSON.stringify(fileMetadata)], { type: 'application/json' }));
                form.append('file', arquivoBlob);

                const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + accessToken
                    },
                    body: form
                });

                if (response.ok) {
                    console.log('✓ ' + nomeArquivo + ' enviado com sucesso!');
                    return true;
                } else {
                    const errorText = await response.text();
                    console.error('Erro no upload:', errorText);
                    alert('Erro ao enviar ' + nomeArquivo + ': ' + response.status);
                    return false;
                }
            } catch (error) {
                console.error('Erro na autenticação ou upload:', error);
                alert('Erro na autenticação ou upload: ' + error.message);
                return false;
            }
        }

        // Event listeners dos botões
        document.getElementById('gerarPdfBtn').addEventListener('click', async () => {
            try {
                const pdfBlob = await gerarPDF();
                const titulo = document.getElementById('titulo').value;
                const nomeArquivo = `${titulo}.pdf`;
                const sucesso = await enviarParaDrive(pdfBlob, nomeArquivo);
                if (sucesso) {
                    alert('✓ PDF enviado com sucesso para o Google Drive!');
                } else {
                    alert('Erro ao enviar PDF.');
                }
            } catch (error) {
                alert('Erro ao gerar PDF: ' + error.message);
            }
        });

        document.getElementById('gerarDocBtn').addEventListener('click', async () => {
            if (!window.docx) {
                alert('Biblioteca DOCX ainda não carregou. Tente novamente em alguns segundos.');
                return;
            }
            try {
                const docBlob = await gerarDOCX();
                const titulo = document.getElementById('titulo').value;
                const nomeArquivo = `${titulo}.docx`;
                const sucesso = await enviarParaDrive(docBlob, nomeArquivo);
                if (sucesso) {
                    alert('✓ DOC enviado com sucesso para o Google Drive!');
                } else {
                    alert('Erro ao enviar DOC.');
                }
            } catch (error) {
                alert('Erro ao gerar DOC: ' + error.message);
            }
        });

        document.getElementById('gerarAmbosBtn').addEventListener('click', async () => {
            if (!window.docx) {
                alert('Biblioteca DOCX ainda não carregou. Tente novamente em alguns segundos.');
                return;
            }
            try {
                const pdfBlob = await gerarPDF();
                const docBlob = await gerarDOCX();
                const titulo = document.getElementById('titulo').value;
                
                const nomePdf = `${titulo}.pdf`;
                const nomeDoc = `${titulo}.docx`;
                
                const resultadoPdf = await enviarParaDrive(pdfBlob, nomePdf);
                const resultadoDoc = await enviarParaDrive(docBlob, nomeDoc);
                
                if (resultadoPdf && resultadoDoc) {
                    alert('✓ PDF e DOC enviados com sucesso para o Google Drive!');
                } else if (resultadoPdf) {
                    alert('✓ PDF enviado, mas houve erro ao enviar DOC.');
                } else if (resultadoDoc) {
                    alert('✓ DOC enviado, mas houve erro ao enviar PDF.');
                } else {
                    alert('Erro ao enviar os arquivos.');
                }
            } catch (error) {
                alert('Erro ao gerar arquivos: ' + error.message);
            }
        });

        document.getElementById('reauthBtn').addEventListener('click', () => {
            forceReauth();
        });
    </script>
</body>
</html>
