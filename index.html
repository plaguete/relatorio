<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Relatório Diário ABNT</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .section {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        textarea {
            height: 100px;
        }
        button {
            display: block;
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gerador de Relatório Diário ABNT</h1>
        <form id="relatorioForm">
            <div class="section">
                <label for="titulo">Título do Relatório:</label>
                <input type="text" id="titulo" required>
            </div>
            <div class="section">
                <label for="autor">Autor:</label>
                <input type="text" id="autor" required>
            </div>
            <div class="section">
                <label for="data">Data:</label>
                <input type="date" id="data" required>
            </div>
            <div class="section">
                <label for="instituicao">Instituição:</label>
                <input type="text" id="instituicao">
            </div>
            <div class="section">
                <label for="introducao">Introdução:</label>
                <textarea id="introducao"></textarea>
            </div>
            <div class="section">
                <label for="objetivos">Objetivos:</label>
                <textarea id="objetivos"></textarea>
            </div>
            <div class="section">
                <label for="materiais">Materiais Utilizados:</label>
                <textarea id="materiais"></textarea>
            </div>
            <div class="section">
                <label for="experimental">Parte Experimental:</label>
                <textarea id="experimental"></textarea>
            </div>
            <div class="section">
                <label for="resultados">Resultados e Discussão:</label>
                <textarea id="resultados"></textarea>
            </div>
            <div class="section">
                <label for="observacoes">Observações:</label>
                <textarea id="observacoes"></textarea>
            </div>
            <div class="section">
                <label for="bibliografia">Bibliografia:</label>
                <textarea id="bibliografia"></textarea>
            </div>
            <button type="button" id="gerarBtn">Gerar e Enviar Relatório</button>
        </form>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script async defer src="https://accounts.google.com/gsi/client"></script>
    <script async defer src="https://apis.google.com/js/api.js"></script>
    <script>
        // Configurações do Google Drive API (Google Identity Services - GSI)
        // Para configurar:
        // 1. Vá para https://console.cloud.google.com/
        // 2. Crie um projeto ou selecione um existente
        // 3. Habilite a Google Drive API
        // 4. Crie credenciais OAuth 2.0 (Client ID)
        // 5. Adicione o domínio do seu site nas configurações do OAuth
        // 6. Substitua SEU_CLIENT_ID_AQUI pelo Client ID
        // 7. Para a pasta, crie uma pasta no Drive, copie o ID da URL e substitua SUA_PASTA_ID_AQUI
        const CLIENT_ID = '115610315865-tfqdh7l8pq6fth5ns3rc7e41jba2osah.apps.googleusercontent.com';
        const PASTA_ID = '15NsKeQxuEg8w2ZCQsF0Atiu62Wsh53AJ';
        const SCOPES = 'https://www.googleapis.com/auth/drive.file';

        let tokenClient;
        let accessToken = null;

        // Inicializar Google Identity Services
        function initializeGSI() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: handleTokenResponse
            });
        }

        function handleTokenResponse(response) {
            if (response.access_token) {
                accessToken = response.access_token;
                console.log('✓ Acesso autenticado');
            }
        }

        // Solicitar token de acesso
        function requestAccessToken() {
            if (accessToken === null) {
                tokenClient.requestAccessToken({prompt: 'consent'});
            } else {
                tokenClient.requestAccessToken({prompt: ''});
            }
        }

        // Esperar que GSI esteja carregado
        window.addEventListener('load', () => {
            if (typeof google !== 'undefined') {
                initializeGSI();
            }
        });


        // Gerar PDF
        function gerarPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            // Configurações ABNT: Margens 3cm superior/inferior, 3cm esquerda, 2cm direita
            // A4: 210mm x 297mm, 1cm = 28.35 pontos
            const marginLeft = 85; // 3cm
            const marginRight = 57; // 2cm
            const marginTop = 85;
            const marginBottom = 85;
            const pageWidth = 210 * 2.83465; // pontos
            const pageHeight = 297 * 2.83465;
            const contentWidth = pageWidth - marginLeft - marginRight;

            doc.setFont('times', 'normal');
            doc.setFontSize(12);
            doc.setLineHeightFactor(1.5); // Espaçamento 1.5

            const titulo = document.getElementById('titulo').value;
            const autor = document.getElementById('autor').value;
            const data = document.getElementById('data').value;
            const instituicao = document.getElementById('instituicao').value;
            const introducao = document.getElementById('introducao').value;
            const objetivos = document.getElementById('objetivos').value;
            const materiais = document.getElementById('materiais').value;
            const experimental = document.getElementById('experimental').value;
            const resultados = document.getElementById('resultados').value;
            const observacoes = document.getElementById('observacoes').value;
            const bibliografia = document.getElementById('bibliografia').value;

            // Capa
            doc.setFontSize(16);
            doc.text(titulo, pageWidth / 2, marginTop + 50, { align: 'center' });
            doc.setFontSize(12);
            doc.text(`Autor: ${autor}`, pageWidth / 2, marginTop + 80, { align: 'center' });
            doc.text(`Data: ${data}`, pageWidth / 2, marginTop + 100, { align: 'center' });
            if (instituicao) doc.text(`Instituição: ${instituicao}`, pageWidth / 2, marginTop + 120, { align: 'center' });

            // Função para adicionar seção
            function addSection(title, content, startY) {
                let y = startY;
                doc.setFontSize(14);
                doc.text(title, marginLeft, y);
                y += 20;
                doc.setFontSize(12);
                const lines = doc.splitTextToSize(content, contentWidth);
                doc.text(lines, marginLeft, y);
                return y + lines.length * 5 + 10; // Estimativa de altura
            }

            doc.addPage();
            let y = marginTop;

            y = addSection('Introdução', introducao, y);
            if (y > pageHeight - marginBottom) { doc.addPage(); y = marginTop; }

            y = addSection('Objetivos', objetivos, y);
            if (y > pageHeight - marginBottom) { doc.addPage(); y = marginTop; }

            y = addSection('Materiais Utilizados', materiais, y);
            if (y > pageHeight - marginBottom) { doc.addPage(); y = marginTop; }

            y = addSection('Parte Experimental', experimental, y);
            if (y > pageHeight - marginBottom) { doc.addPage(); y = marginTop; }

            y = addSection('Resultados e Discussão', resultados, y);
            if (y > pageHeight - marginBottom) { doc.addPage(); y = marginTop; }

            y = addSection('Observações', observacoes, y);
            if (y > pageHeight - marginBottom) { doc.addPage(); y = marginTop; }

            y = addSection('Bibliografia', bibliografia, y);

            return doc.output('blob');
        }

        // Enviar para Google Drive
        async function enviarParaDrive(pdfBlob) {
            if (accessToken === null) {
                console.log('Solicitando acesso...');
                requestAccessToken();
                
                // Aguardar até 3 segundos pelo token
                let attempts = 0;
                const waitForToken = setInterval(() => {
                    attempts++;
                    if (accessToken !== null) {
                        clearInterval(waitForToken);
                        enviarParaDrive(pdfBlob);
                    } else if (attempts > 30) {
                        clearInterval(waitForToken);
                        alert('Timeout na autenticação. Tente novamente.');
                    }
                }, 100);
                return;
            }

            try {
                const fileMetadata = {
                    name: `${document.getElementById('titulo').value}.pdf`,
                    parents: [PASTA_ID]
                };

                const form = new FormData();
                form.append('metadata', new Blob([JSON.stringify(fileMetadata)], { type: 'application/json' }));
                form.append('file', pdfBlob);

                const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + accessToken
                    },
                    body: form
                });

                if (response.ok) {
                    alert('✓ Relatório enviado com sucesso para o Google Drive!');
                } else {
                    const errorText = await response.text();
                    console.error('Erro:', errorText);
                    alert('Erro ao enviar para o Drive: ' + response.status);
                }
            } catch (error) {
                console.error(error);
                alert('Erro na autenticação ou upload: ' + error.message);
            }
        }

        // Evento do botão
        document.getElementById('gerarBtn').addEventListener('click', async () => {
            const pdfBlob = gerarPDF();
            await enviarParaDrive(pdfBlob);
        });
    </script>
</body>
</html>
